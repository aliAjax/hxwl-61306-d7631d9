name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality-check:
    name: 质量检查 (Lint + Type + Unit Tests)
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 代码风格检查 (ESLint)
        run: npm run lint

      - name: 类型检查 (TypeScript)
        run: npm run typecheck

      - name: 单元测试 (Vitest)
        run: npm run test:unit
        env:
          CI: true

  build:
    name: 构建验证
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建项目
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  e2e-smoke:
    name: E2E 冒烟测试 (Playwright)
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 安装 Playwright 浏览器
        run: npm run test:e2e:install

      - name: 安装 Playwright 系统依赖
        run: npx playwright install-deps chromium

      - name: 运行冒烟测试
        run: npm run test:e2e
        env:
          CI: true

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: 上传测试结果 (失败截图/trace)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30
